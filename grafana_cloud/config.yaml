name: "Grafana Cloud"
description: "Send metrics & logs to Grafana Cloud"
version: "0.1.2"
slug: "grafana_cloud"
init: false
arch:
  - amd64
  - aarch64
options:
  stack_name: null
  access_token: null
  instance_name: homeassistant
  scrape_interval: 60s
  log_level: info
schema:
  stack_name: str
  access_token: str
  instance_name: str?
  scrape_interval: str?
  log_level: list(debug|info|warn|error)
homeassistant_api: true
apparmor: false
journald: true
map:
  - homeassistant_config
  - addon_config:rw
ports:
  80/tcp: null
  5514/udp: null
  5516/udp: null
  5517/udp: null
  6514/tcp: null
  9999/tcp: null
ports_description:
  80/tcp: "Debug UI"
  5514/udp: "Override-only: Syslog UDP receiver (requires custom config.alloy listeners)"
  5516/udp: "Override-only: Syslog UDP receiver (requires custom config.alloy listeners)"
  5517/udp: "Override-only: Syslog UDP receiver (requires custom config.alloy listeners)"
  6514/tcp: "Override-only: Syslog TCP/TLS receiver (requires custom config.alloy listeners)"
  9999/tcp: "Override-only: Loki HTTP push receiver (requires custom config.alloy listeners)"
webui: "http://[HOST]:[PORT:80]/"
image: "ghcr.io/grafana/hass-addon-grafana-cloud-{arch}"
